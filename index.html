<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sneaker Store</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}
header {
    background: #111; 
    color: #fff;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
nav a {
    color: white;
    margin-left: 20px;
    text-decoration: none;
    font-weight: bold;
}
.hero { 
    background: linear-gradient(to right, #000, #444);
    color: white;
    padding: 80px;
    text-align: center;
}
.hero h1 {
    font-size: 50px;
}
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    padding: 40px;
} 
.card {
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    padding: 20px;
    text-align: center;
    transition: transform 0.3s;
}
.card:hover {
    transform: scale(1.05);
}
.card img{
    width: 100%;
    border-radius: 15px;
}
.card h3 {
    margin: 10px 0;
}
.card button {
    background: black;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 30px;
    cursor: pointer;
}
.card button:hover {
    background: #444;
}
footer {
    text-align: center;
    padding: 20px;
    background: #111;
    color: white;
}
</style>
</head>
<body>
<header>
    <h2>Junaid's Sneaker Store</h2>
    <nav>
        <a href="#">Home</a>
        <a href="#">Sneakers</a>
        <a href="#">Cart</a>
    </nav>
</header>
<section class="hero">
    <h1>Premium Sneakers</h1>
    <p>Street Style • Comfort • Limited Edition </p>
</section>
<section class="products">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" alt="Nike Air Max">
        <h3>Nike Air Max</h3>
        <p>₹8,999</p>
        <button>Add to Cart</button>
    </div>
    <div class="card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSwxNrRgFsOs4WsJvvYxRbWplZRes-Jutaxuw&s" alt="Nike Jordan">
        <h3>Nike Jordan</h3>
        <p>₹12,499</p>
        <button>Add to Cart</button>
    </div>
    <div class="card">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT12d3vnuOGogqgFWAaQBBNuRvaA9M_PWonsw&s" alt="Nike Zoom">
        <h3>Nike Zoom</h3>
        <p>₹9,499</p>
        <button>Add To Cart</button> 
    </div>
</section>
<footer>
    <p>© 2026 Sneaker Store</p>   
</footer>
</body>
</html>
